apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "haruki.fullname" . }}
  labels:
    {{- include "haruki.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      {{- include "haruki.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "haruki.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
        {{- with .Values.api.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.api.podAnnotations }}
      annotations: {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "haruki.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext: {{- toYaml .Values.securityContext | nindent 8 }}
      containers:
        - name: api
          image: {{ include "haruki.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext: {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          command: ["./haruki-sekai-api"]
          ports:
            - name: http
              containerPort: {{ .Values.api.service.port }}
              protocol: TCP
          env:
            {{- include "haruki.envBlock" . | nindent 12 }}
          {{- if or .Values.secrets.existing .Values.configFile.enabled .Values.persistence.accounts.enabled }}
          volumeMounts:
            {{- include "haruki.apiVolumeMounts" . | nindent 12 }}
          {{- end }}
          livenessProbe: {{- toYaml .Values.api.livenessProbe | nindent 12 }}
          readinessProbe: {{- toYaml .Values.api.readinessProbe | nindent 12 }}
          resources: {{- toYaml .Values.api.resources | nindent 12 }}
      {{- if or .Values.secrets.existing .Values.configFile.enabled .Values.persistence.accounts.enabled }}
      volumes:
        {{- include "haruki.apiVolumes" . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.nodeSelector }}
      nodeSelector: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.affinity }}
      affinity: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.tolerations }}
      tolerations: {{- toYaml . | nindent 8 }}
      {{- end }}

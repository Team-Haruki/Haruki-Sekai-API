apiVersion: v1
kind: Service
metadata:
  name: {{ include "haruki.fullname" . }}
  labels: {{- include "haruki.labels" . | nindent 4 }}
  {{- with .Values.api.service.annotations }}
  annotations: {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.api.service.type }}
  ports:
    - name: http
      port: {{ .Values.api.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "haruki.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api

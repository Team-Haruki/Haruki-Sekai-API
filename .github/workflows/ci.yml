name: CI

on:
  pull_request:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust checks (${{ matrix.crate.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate:
          - name: haruki-sekai-api
            working-directory: .
          - name: ent_generator
            working-directory: tools/ent_generator

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: matrix.crate.working-directory == '.'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake pkg-config

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ${{ matrix.crate.working-directory }}/target
          key: ${{ runner.os }}-${{ matrix.crate.name }}-cargo-${{ hashFiles('Cargo.lock', 'tools/ent_generator/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.crate.name }}-cargo-

      - name: Check formatting
        working-directory: ${{ matrix.crate.working-directory }}
        run: cargo fmt -- --check

      - name: Run clippy
        working-directory: ${{ matrix.crate.working-directory }}
        run: cargo clippy --all-targets --all-features --locked -- -D warnings

      - name: Run tests
        working-directory: ${{ matrix.crate.working-directory }}
        run: cargo test --all-targets --all-features --locked

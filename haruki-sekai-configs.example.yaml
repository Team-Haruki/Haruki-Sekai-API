# =============================================================================
# Haruki Sekai API configuration
# =============================================================================
# Multi-source loading (priority, low -> high):
#   1. Built-in defaults
#   2. This YAML file (path: $CONFIG_PATH, default ./haruki-sekai-configs.yaml)
#   3. Environment variables prefixed with HARUKI_, with `__` for nested keys
#        examples:
#          HARUKI_BACKEND__PORT=9999
#          HARUKI_REDIS__URL=redis://:pass@redis.svc:6379/0
#          HARUKI_SERVERS__JP__AES_KEY_HEX=deadbeef...
#   4. Secret-file fields (`*_file`): for any sensitive setting, set its
#      `_file` companion to a path; the trimmed file contents replace the
#      plain field. This pairs with K8s Secret/Docker secret mounts.
#        e.g. database.dsn_file, redis.password_file, redis.url_file,
#             backend.sekai_user_jwt_signing_key_file,
#             git.password_file, git.signing_key_file,
#             servers.<region>.aes_key_hex_file,
#             servers.<region>.aes_iv_hex_file,
#             servers.<region>.*_storage.secret_access_key_file,
#             servers.<region>.*_storage.access_key_secret_file,
#             apphash_sources[N].storage.secret_access_key_file,
#             apphash_sources[N].storage.access_key_secret_file,
#             asset_updater_servers[N].authorization_file
#
# Optional OpenDAL storage blocks can replace selected local paths. Supported
# schemes compiled into this binary: fs, s3, oss, cos, gcs, azblob, obs.
# If a storage block is omitted, the legacy path field next to it is used.
# Local account storage uses notify-based file watching; non-fs account
# storage uses periodic OpenDAL list/stat polling (`poll_interval_secs`).
#
# Local single-file deployments need none of the above — this YAML alone works.
# The default YAML path being absent is OK *only* when CONFIG_PATH is unset
# (intended for K8s ConfigMap/Secret-only deployments).
# =============================================================================

proxy: ""
jp_sekai_cookie_url: ""

git:
  enabled: false
  username: ""
  email: "@users.noreply.github.com"
  password: ""
  sign_commits: false
  signing_format: "gpg" # gpg | ssh
  signing_key: "" # GPG key id, SSH public/private key path, or SSH public key
  signing_program: "" # optional: gpg.program for GPG or gpg.ssh.program for SSH

redis:
  enabled: true # set it to false if not using redis
  host: "127.0.0.1"
  port: 6379
  password: "" # keep it empty if no password
  # url: "redis://:pass@host:6379/0"  # if non-empty, takes precedence over host/port/password

backend:
  host: "0.0.0.0"
  port: 9999
  ssl: false
  ssl_cert: ""
  ssl_key: ""
  log_level: "INFO"
  log_format: "text" # "text" (colored single-line, default) or "json" (one JSON object per line, K8s-friendly)
  main_log_file: "" # currently unused; all logs go to stdout via tracing
  access_log: "" # currently unused; tower-http TraceLayer emits DEBUG spans through tracing
  access_log_path: "" # currently unused; see above
  sekai_user_jwt_signing_key: ""
  # Run master / app-hash / cookie-refresh cron jobs inside this process.
  # Default: true (single-process / local deployment).
  # In multi-replica K8s setups, set this to false on the API Deployment and
  # run the bundled `haruki-sekai-updater` binary as a separate replicas=1
  # Deployment to avoid duplicate cron firings and git-push races.
  run_updaters_inproc: true
  enable_trust_proxy: true
  trusted_proxies:
    - "127.0.0.0/8"
    - "::1/128"
    - "192.168.0.0/16"
    - "172.16.0.0/12"
    - "100.64.0.0/10"
    - "10.0.0.0/8"
  proxy_header: "X-Forwarded-For"

database:
  enabled: true # set it to false if not using database
  driver: "postgres" # sqlite | mysql | postgres
  dsn: "postgres://user:pass@host:port/database?sslmode=disable"
  max_connections: 25

master_database:
  enabled: false # set to true to enable master data ingestion into PostgreSQL
  driver: "postgres"
  dsn: "postgres://haruki:sekai@localhost:5432/master_data"
  max_connections: 10

apphash_sources: # sources for apphash, to update apphash values periodically
  # - type: file
  #   dir: "/path/to/your/local/apphash_json/directory"
  # - type: file
  #   storage:
  #     scheme: "s3"
  #     bucket: "haruki-sekai"
  #     root: "apphash"
  #     endpoint: "https://s3.example.com"
  #     region: "auto"
  #     access_key_id: ""
  #     secret_access_key_file: "/run/secrets/haruki/s3_secret"
  - type: "url"
    url: "https://apphash.provider.com/apphash_json"

asset_updater_servers: # Haruki Sekai Asset Updater server instances
  - url: "http://127.0.0.1:12345/update_asset"
    authorization: ""

servers:
  jp:
    enabled: false
    api_url: ""
    require_cookies: true
    headers:
      Host: ""
      # fill in other headers as needed
    aes_key_hex: ""
    aes_iv_hex: ""
    account_dir: ""
    # account_storage:
    #   scheme: "s3"
    #   bucket: "haruki-sekai"
    #   root: "accounts/jp"
    #   endpoint: "https://s3.example.com"
    #   region: "auto"
    #   access_key_id: ""
    #   secret_access_key_file: "/run/secrets/haruki/s3_secret"
    #   poll_interval_secs: 30
    master_dir: ""
    # master_storage:
    #   scheme: "s3"
    #   bucket: "haruki-sekai"
    #   root: "master/jp"
    #   endpoint: "https://s3.example.com"
    #   region: "auto"
    #   access_key_id: ""
    #   secret_access_key_file: "/run/secrets/haruki/s3_secret"
    version_path: ""
    # version_storage:
    #   scheme: "s3"
    #   bucket: "haruki-sekai"
    #   root: "versions"
    #   path: "jp/version.json"
    #   endpoint: "https://s3.example.com"
    #   region: "auto"
    #   access_key_id: ""
    #   secret_access_key_file: "/run/secrets/haruki/s3_secret"
    nuverse_master_data_url: ""
    nuverse_structure_file_path: ""
    # nuverse_structure_storage:
    #   scheme: "s3"
    #   bucket: "haruki-sekai"
    #   root: "nuverse"
    #   path: "jp/structure.json"
    #   endpoint: "https://s3.example.com"
    #   region: "auto"
    #   access_key_id: ""
    #   secret_access_key_file: "/run/secrets/haruki/s3_secret"
